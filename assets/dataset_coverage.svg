<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="V5 dataset coverage chart">
  <rect width="1100" height="560" fill="#f8fafc"/>
  <text x="55" y="58" fill="#0f172a" font-family="Georgia, serif" font-size="34" font-weight="700">V5 Dataset Coverage</text>
  <text x="55" y="90" fill="#475569" font-family="Verdana, sans-serif" font-size="15">3560 curated examples across 23 ML/DL math task families</text>

  <g font-family="Verdana, sans-serif" font-size="13" fill="#0f172a">
    <text x="70" y="145">Backprop and losses</text>
    <rect x="250" y="128" width="325" height="22" rx="11" fill="#22c55e"/>
    <text x="590" y="145">880</text>

    <text x="70" y="185">Optimizers and gradients</text>
    <rect x="250" y="168" width="312" height="22" rx="11" fill="#0ea5e9"/>
    <text x="590" y="185">800</text>

    <text x="70" y="225">Tensors and shapes</text>
    <rect x="250" y="208" width="172" height="22" rx="11" fill="#f59e0b"/>
    <text x="590" y="225">430</text>

    <text x="70" y="265">Normalization and dropout</text>
    <rect x="250" y="248" width="156" height="22" rx="11" fill="#14b8a6"/>
    <text x="590" y="265">400</text>

    <text x="70" y="305">Metrics and accuracy</text>
    <rect x="250" y="288" width="94" height="22" rx="11" fill="#6366f1"/>
    <text x="590" y="305">240</text>

    <text x="70" y="345">Similarity and retrieval</text>
    <rect x="250" y="328" width="102" height="22" rx="11" fill="#ec4899"/>
    <text x="590" y="345">260</text>

    <text x="70" y="385">Attention</text>
    <rect x="250" y="368" width="59" height="22" rx="11" fill="#8b5cf6"/>
    <text x="590" y="385">150</text>

    <text x="70" y="425">CNN shapes</text>
    <rect x="250" y="408" width="51" height="22" rx="11" fill="#ef4444"/>
    <text x="590" y="425">130</text>
  </g>

  <g transform="translate(720 120)">
    <rect width="300" height="330" rx="28" fill="#0f172a"/>
    <text x="30" y="55" fill="#f8fafc" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Public release policy</text>
    <text x="30" y="100" fill="#bbf7d0" font-family="Verdana, sans-serif" font-size="15">GitHub</text>
    <text x="30" y="128" fill="#e2e8f0" font-family="Verdana, sans-serif" font-size="13">code, docs, reports, charts</text>
    <text x="30" y="154" fill="#e2e8f0" font-family="Verdana, sans-serif" font-size="13">minimal sample JSONL only</text>
    <text x="30" y="205" fill="#bfdbfe" font-family="Verdana, sans-serif" font-size="15">Hugging Face</text>
    <text x="30" y="233" fill="#e2e8f0" font-family="Verdana, sans-serif" font-size="13">LoRA adapter artifacts</text>
    <text x="30" y="259" fill="#e2e8f0" font-family="Verdana, sans-serif" font-size="13">optional private/full dataset repo</text>
  </g>
</svg>
