<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Gemma TIMMY MLDL Maths v5 architecture">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#12312b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1100" height="520" fill="url(#bg)"/>
  <circle cx="1060" cy="80" r="180" fill="#22c55e" opacity="0.12"/>
  <circle cx="80" cy="460" r="160" fill="#38bdf8" opacity="0.10"/>
  <text x="60" y="70" fill="#ecfeff" font-family="Georgia, serif" font-size="38" font-weight="700">Gemma--TIMMY-MLDL-Maths-v5</text>
  <text x="60" y="105" fill="#a7f3d0" font-family="Verdana, sans-serif" font-size="17">Hybrid assistant: LLM explanation plus deterministic math execution</text>

  <g filter="url(#shadow)">
    <rect x="60" y="170" width="220" height="120" rx="22" fill="url(#card)"/>
    <text x="90" y="215" fill="#0f172a" font-family="Verdana, sans-serif" font-size="20" font-weight="700">User Prompt</text>
    <text x="90" y="250" fill="#334155" font-family="Verdana, sans-serif" font-size="14">ML/DL math question</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="130" width="260" height="115" rx="22" fill="#fef3c7"/>
    <text x="382" y="175" fill="#1f2937" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Route + Parse</text>
    <text x="382" y="210" fill="#475569" font-family="Verdana, sans-serif" font-size="14">detect task family and values</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="350" y="295" width="260" height="115" rx="22" fill="#dcfce7"/>
    <text x="382" y="340" fill="#14532d" font-family="Verdana, sans-serif" font-size="20" font-weight="700">DL Calculators</text>
    <text x="382" y="375" fill="#166534" font-family="Verdana, sans-serif" font-size="14">exact loss, metrics, tensors</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="130" width="300" height="115" rx="22" fill="#e0f2fe"/>
    <text x="722" y="175" fill="#0c4a6e" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Gemma LoRA</text>
    <text x="722" y="210" fill="#075985" font-family="Verdana, sans-serif" font-size="14">formula language and tutoring style</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="295" width="300" height="115" rx="22" fill="#f8fafc"/>
    <text x="722" y="340" fill="#111827" font-family="Verdana, sans-serif" font-size="20" font-weight="700">Final Answer</text>
    <text x="722" y="375" fill="#475569" font-family="Verdana, sans-serif" font-size="14">reliable numbers plus explanation</text>
  </g>

  <path d="M280 230 C310 230 320 188 350 188" stroke="#a7f3d0" stroke-width="5" fill="none"/>
  <path d="M480 245 L480 295" stroke="#a7f3d0" stroke-width="5" fill="none"/>
  <path d="M610 352 C650 352 650 352 690 352" stroke="#a7f3d0" stroke-width="5" fill="none"/>
  <path d="M610 188 C650 188 650 188 690 188" stroke="#a7f3d0" stroke-width="5" fill="none"/>
  <path d="M840 245 L840 295" stroke="#a7f3d0" stroke-width="5" fill="none"/>

  <text x="60" y="470" fill="#d1fae5" font-family="Verdana, sans-serif" font-size="15">Design rule: do not ask a small LoRA to be a calculator. Let it explain; let code compute.</text>
</svg>
