<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Raw LoRA vs hybrid reliability comparison">
  <rect width="1100" height="520" fill="#fff7ed"/>
  <text x="55" y="62" fill="#111827" font-family="Georgia, serif" font-size="34" font-weight="700">Why Hybrid Beats Raw LoRA For Math</text>
  <text x="55" y="94" fill="#57534e" font-family="Verdana, sans-serif" font-size="15">Expanded V5 smoke test: raw generation learned style, deterministic execution handled exact arithmetic.</text>

  <g transform="translate(90 155)">
    <rect x="0" y="0" width="390" height="230" rx="30" fill="#fee2e2"/>
    <text x="35" y="58" fill="#7f1d1d" font-family="Verdana, sans-serif" font-size="26" font-weight="700">Raw LoRA</text>
    <text x="35" y="98" fill="#991b1b" font-family="Verdana, sans-serif" font-size="17">2 / 10</text>
    <rect x="35" y="122" width="300" height="24" rx="12" fill="#fecaca"/>
    <rect x="35" y="122" width="60" height="24" rx="12" fill="#dc2626"/>
    <text x="35" y="178" fill="#7f1d1d" font-family="Verdana, sans-serif" font-size="14">Good at tone and formula patterns</text>
    <text x="35" y="205" fill="#7f1d1d" font-family="Verdana, sans-serif" font-size="14">Unreliable for exact arithmetic</text>
  </g>

  <g transform="translate(620 155)">
    <rect x="0" y="0" width="390" height="230" rx="30" fill="#dcfce7"/>
    <text x="35" y="58" fill="#14532d" font-family="Verdana, sans-serif" font-size="26" font-weight="700">Hybrid Assistant</text>
    <text x="35" y="98" fill="#166534" font-family="Verdana, sans-serif" font-size="17">10 / 10</text>
    <rect x="35" y="122" width="300" height="24" rx="12" fill="#bbf7d0"/>
    <rect x="35" y="122" width="300" height="24" rx="12" fill="#16a34a"/>
    <text x="35" y="178" fill="#14532d" font-family="Verdana, sans-serif" font-size="14">LLM explains and formats</text>
    <text x="35" y="205" fill="#14532d" font-family="Verdana, sans-serif" font-size="14">Python calculators compute exact values</text>
  </g>

  <path d="M500 270 C540 230 570 230 610 270" stroke="#9a3412" stroke-width="4" fill="none"/>
  <text x="473" y="430" fill="#7c2d12" font-family="Verdana, sans-serif" font-size="16">Final public recommendation: ship both the adapter and the calculator-backed runtime.</text>
</svg>
