<svg width="920" height="520" viewBox="0 0 920 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">V5.2 Guardrail Stress-Test Improvement</title>
  <desc id="desc">Infographic showing adversarial safety improving from 6.5 out of 10 to 9.5 out of 10, and V5.2 regression coverage staying at 437 of 437.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#133047"/>
      <stop offset="100%" stop-color="#19423f"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="920" height="520" rx="34" fill="url(#bg)"/>
  <circle cx="820" cy="96" r="130" fill="#38bdf8" opacity="0.10"/>
  <circle cx="90" cy="440" r="170" fill="#22c55e" opacity="0.10"/>

  <text x="54" y="70" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">
    Gemma TIMMY Maths V5.2
  </text>
  <text x="54" y="106" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Stress-tested hybrid math router with calculator-first guardrails
  </text>

  <g filter="url(#shadow)">
    <rect x="54" y="145" width="365" height="250" rx="24" fill="#f8fafc"/>
    <text x="82" y="188" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">
      Before Guardrails
    </text>
    <text x="82" y="230" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">
      Unsafe numeric fallback could infer
    </text>
    <text x="82" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">
      structure from vague prompts.
    </text>
    <rect x="82" y="287" width="280" height="28" rx="14" fill="#e2e8f0"/>
    <rect x="82" y="287" width="182" height="28" rx="14" fill="url(#warn)"/>
    <text x="82" y="353" fill="#ef4444" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="900">
      6.5/10
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="501" y="145" width="365" height="250" rx="24" fill="#f8fafc"/>
    <text x="529" y="188" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">
      After Guardrails
    </text>
    <text x="529" y="230" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">
      Missing inputs, invalid math, and
    </text>
    <text x="529" y="252" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15">
      ambiguity return structured responses.
    </text>
    <rect x="529" y="287" width="280" height="28" rx="14" fill="#e2e8f0"/>
    <rect x="529" y="287" width="266" height="28" rx="14" fill="url(#good)"/>
    <text x="529" y="353" fill="#059669" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="900">
      9.5/10
    </text>
  </g>

  <path d="M435 270 H485" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round"/>
  <path d="M470 252 L489 270 L470 288" fill="none" stroke="#e2e8f0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="54" y="425" width="812" height="54" rx="18" fill="#020617" opacity="0.42"/>
    <text x="82" y="459" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
      Regression suite:
    </text>
    <text x="245" y="459" fill="#86efac" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">
      437 / 437 passed
    </text>
    <text x="420" y="459" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">
      messy prompts, combined tasks, and missing-info cases
    </text>
  </g>
</svg>
